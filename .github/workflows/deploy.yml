name: Deploy to GitHub Pages

on:
  # Run automatically every Sunday at 12:00 UTC
  schedule:
    - cron: "0 0 * * 0"
  # Run when pushed. Use { branches: [main, master] } to run only on specific branches
  push:
  # Allow manual triggering of the workflow
  workflow_dispatch:

permissions:
  # To commit outlier history to the data branch
  contents: write
  # To deploy to GitHub Pages
  pages: write
  # To verify that deployment originated from the right source
  id-token: write

jobs:
  # Run as a single build + deploy job to reduce setup time
  deploy:
    # Specify the deployment environment. Displays the URL in the GitHub Actions UI
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    # Run on the latest Ubuntu LTS
    runs-on: ubuntu-latest

    steps:
      # Checkout the repository
      - uses: actions/checkout@v4

      # Install uv
      - uses: astral-sh/setup-uv@v5
      # Run a Python script
      - run: uv run imdb_refresh.py; rm *.tsv.gz

      # Upload a specific page to GitHub Pages. Defaults to _site
      - uses: actions/upload-pages-artifact@v3
        with:
          path: .

      # Deploy the built site to GitHub Pages. The `id:` is required to show the URL in the GitHub Actions UI
      - id: deployment
        uses: actions/deploy-pages@v4

      - name: Commit outliers to data branch
        if: github.event_name == 'schedule'
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          tmp=$(mktemp -d)
          cp -R outliers "$tmp/outliers"
          git fetch origin data:refs/remotes/origin/data || true
          if git show-ref --verify --quiet refs/remotes/origin/data; then
            git worktree add "$tmp/worktree" origin/data
          else
            git worktree add --detach "$tmp/worktree"
            git -C "$tmp/worktree" switch --orphan data
            git -C "$tmp/worktree" rm -rf . || true
          fi
          mkdir -p "$tmp/worktree/outliers"
          cp -R "$tmp/outliers/." "$tmp/worktree/outliers/"
          git -C "$tmp/worktree" add -f outliers
          if ! git -C "$tmp/worktree" diff --cached --quiet; then
            git -C "$tmp/worktree" commit -m "Update outliers $(date -u +%F)"
            git -C "$tmp/worktree" push origin HEAD:data
          fi
